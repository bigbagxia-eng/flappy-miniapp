<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flappy Mini</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="wrap">
    <div id="frame">

      <canvas id="c" width="360" height="640"></canvas>

      <!-- HUD (только для игры) -->
      <div id="hud" class="hud-hidden">
        <div id="scoreBox">
          <div id="score">0</div>
          <div class="subrow">
            <div id="best">BEST 0</div>
            <div id="coinsHud">🪙 0</div>
          </div>
        </div>

        <div id="hudBtns">
          <button id="btnPause" class="btn small" title="Пауза">⏸</button>
        </div>
      </div>

      <!-- UI Overlay -->
      <div id="ui">

        <!-- Top bar for menus -->
        <div id="topbar">
          <div id="brand">Flappy Mini</div>
          <div id="coinsTop">🪙 0</div>
        </div>

        <!-- MAIN MENU -->
        <div id="screenMenu" class="screen">
          <div class="card big">
            <div class="title">Flappy Mini</div>
            <div class="text muted">Играй, собирай монеты и открывай кейсы со скинами.</div>

            <div class="row">
              <button id="btnMenuPlay" class="btn">Играть</button>
            </div>
            <div class="row">
              <button id="btnMenuSettings" class="btn ghost">Настройки</button>
            </div>
            <div class="row">
              <button id="btnMenuShop" class="btn ghost">Магазин</button>
            </div>
          </div>
        </div>

        <!-- SETTINGS -->
        <div id="screenSettings" class="screen hidden">
          <div class="card big">
            <div class="title">Настройки</div>

            <div class="setting">
              <div class="labelrow">
                <div>Музыка</div><div id="musicVal" class="muted">100%</div>
              </div>
              <input id="musicSlider" type="range" min="0" max="100" value="100" />
            </div>

            <div class="setting">
              <div class="labelrow">
                <div>Эффекты</div><div id="sfxVal" class="muted">100%</div>
              </div>
              <input id="sfxSlider" type="range" min="0" max="100" value="100" />
            </div>

            <div class="row">
              <button id="btnMute" class="btn ghost">🔊 Звук: ВКЛ</button>
            </div>

            <div class="row">
              <button id="btnBackFromSettings" class="btn">Назад</button>
            </div>
          </div>
        </div>

        <!-- SHOP -->
        <div id="screenShop" class="screen hidden">
          <div class="card big">
            <div class="title">Магазин</div>
            <div class="text muted">Кейс со скином стоит <b>10 🪙</b>. Редкость подсвечивается.</div>

            <div class="shopRow">
              <div class="caseBox">
                <div class="caseIcon">🎁</div>
                <div class="caseText">
                  <div class="caseTitle">Кейс со скином</div>
                  <div class="muted">Цена: 10 🪙</div>
                </div>
              </div>

              <button id="btnOpenCase" class="btn">Открыть кейс</button>
            </div>

            <div id="rouletteWrap" class="hidden">
              <div class="roulette">
                <div class="marker"></div>
                <div id="rouletteStrip" class="strip"></div>
              </div>

              <div id="dropResult" class="dropResult hidden"></div>

              <div class="row">
                <button id="btnEquipSkin" class="btn hidden">Надеть скин</button>
              </div>
            </div>

            <div class="invTitle">Твои скины</div>
            <div id="inventory" class="inventory"></div>

            <div class="row">
              <button id="btnBackFromShop" class="btn">Назад</button>
            </div>
          </div>
        </div>

        <!-- GAME OVER -->
        <div id="screenGameOver" class="screen hidden">
          <div class="card big">
            <div class="title" id="goTitle">Game Over</div>
            <div class="text" id="goText">Счёт: 0</div>

            <div class="row">
              <button id="btnRestart" class="btn">Рестарт</button>
            </div>
            <div class="row">
              <button id="btnBackToMenu" class="btn ghost">В меню</button>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="tg.js"></script>
  <script src="game.js"></script>
</body>
</html>
