<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Flappy Mini</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="wrap">
    <div id="frame">
      <canvas id="c" width="360" height="640"></canvas>

      <!-- HUD (красиво и минимально, поверх канваса) -->
      <div id="hud">
        <div id="scoreBox">
          <div id="score">0</div>
          <div class="subrow">
            <div id="best">BEST 0</div>
            <div id="coinsHud">🪙 0</div>
          </div>
        </div>
        <div id="hudBtns">
          <button id="btnPause" class="btn small ghost" title="Pause">⏸</button>
        </div>
      </div>

      <!-- UI screens -->
      <div id="ui">
        <div id="topbar">
          <div id="brand">Flappy Mini</div>
          <div id="coinsTop">🪙 0</div>
        </div>

        <div id="screenMenu" class="screen">
          <div class="card big">
            <div class="title">Flappy Mini</div>
            <div class="text muted">День/ночь, красивые монеты, кейсы со скинами.</div>
            <div class="row">
              <button id="btnMenuPlay" class="btn">Играть</button>
            </div>
            <div class="row">
              <button id="btnMenuSettings" class="btn ghost">Настройки</button>
              <button id="btnMenuShop" class="btn ghost">Магазин</button>
            </div>
          </div>
        </div>

        <div id="screenSettings" class="screen hidden">
          <div class="card big">
            <div class="title">Настройки</div>

            <div class="setting">
              <div class="labelrow"><span>Музыка</span><span id="musicVal">100%</span></div>
              <input id="musicSlider" type="range" min="0" max="100" value="100" />
            </div>

            <div class="setting">
              <div class="labelrow"><span>Эффекты</span><span id="sfxVal">100%</span></div>
              <input id="sfxSlider" type="range" min="0" max="100" value="100" />
            </div>

            <div class="row">
              <button id="btnMute" class="btn ghost">Звук: ВКЛ</button>
              <button id="btnBackFromSettings" class="btn">Назад</button>
            </div>
          </div>
        </div>

        <div id="screenShop" class="screen hidden">
          <div class="card big">
            <div class="title">Магазин</div>
            <div class="text muted">Кейс со скином стоит <b>10 🪙</b>.</div>

            <div class="shopRow">
              <div class="caseBox">
                <div class="caseIcon">📦</div>
                <div>
                  <div class="caseTitle">Кейс со скином</div>
                  <div class="muted">Цена: <b>10 🪙</b></div>
                </div>
                <button id="btnOpenCase" class="btn">Открыть</button>
              </div>
            </div>

            <div id="rouletteWrap" class="hidden">
              <div class="roulette">
                <div class="marker"></div>
                <div id="rouletteStrip" class="strip"></div>
              </div>
              <div id="dropResult" class="dropResult hidden"></div>
              <div class="row">
                <button id="btnEquipSkin" class="btn hidden">Надеть</button>
              </div>
            </div>

            <div class="invTitle">Твои скины</div>
            <div id="inventory" class="inventory"></div>

            <div class="row">
              <button id="btnBackFromShop" class="btn">Назад</button>
            </div>
          </div>
        </div>

        <div id="screenGameOver" class="screen hidden">
          <div class="card big">
            <div id="goTitle" class="title">Game Over</div>
            <div id="goText" class="text">Счёт: 0</div>
            <div class="row">
              <button id="btnRestart" class="btn">Рестарт</button>
              <button id="btnBackToMenu" class="btn ghost">В меню</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="tg.js"></script>
  <script src="game.js"></script>
</body>
</html>
