<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flappy Mini</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="wrap">
    <div id="frame">
      <canvas id="c" width="360" height="640"></canvas>

      <div id="hud">
        <div id="scoreBox">
          <div id="score">0</div>
          <div id="best">BEST 0</div>
        </div>

        <div id="hudBtns">
          <button id="btnMute" class="btn small">🔊</button>
          <button id="btnPause" class="btn small">⏸</button>
        </div>
      </div>

      <div id="overlay">
        <div class="card">
          <div class="title" id="ovTitle">Flappy Mini</div>
          <div class="text" id="ovText">Нажми чтобы начать</div>
          <div class="row">
            <button id="btnPlay" class="btn">Играть</button>
          </div>
          <div class="row">
            <button id="btnReset" class="btn ghost">Рестарт</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="tg.js"></script>
  <script src="game.js"></script>
</body>
</html>
